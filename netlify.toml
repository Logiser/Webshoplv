[build]
  command = "npm run build"
  publish = "build"
  environment = { CI = "false" }

# Google Shopping feed redirect
[[redirects]]
  from = "/google-shopping-feed.xml"
  to = "/.netlify/functions/google-shopping-feed"
  status = 200

# SPA fallback - MINDIG az utolsó!
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
